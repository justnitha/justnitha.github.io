<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="/frontend/image/image_1/favicon-32x32.png">
  <title>Frontend Mentor | Results summary component</title>
  <link rel="stylesheet" href="/frontend/css/chalenge1.css">
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="container mx-auto lg:flex md:flex  text-white md:mt-28  lg:mt-36 justify-center bg-white shadow-2xl lg:w-2/4">
    <div class="w-full bg-gradient-to-b from-ocean to-ocean-50 text-center rounded-2xl p-5">
        <p class="text-2xl text-ocean-200">Your Result</p>
        <div class=" bg-gradient-to-b from-ocean-100 to-ocean-150 rounded-full max-sm:w-2/4 sm:w-1/3 md:w-2/4 lg:w-2/4 xl:w-2/4  lg:py-9 md:py-12 py-14 mx-auto mt-10">
           <span class="text-5xl items-center font-bold ">76</span><br>
           <span class="text-ocean-200">of 100</span>
        </div>
        <p class="text-4xl mt-5">Great</p>
        <p class="mt-5 text-ocean-200">You Scored higher than 65% of 
          <br> the people who have 
          <br> taken these tests.
        </p>
    </div>
    <div class="w-full p-5 text-black">
      <p class="text-2xl font-medium">Sumarry</p>
      <div class="flex bg-red-50 px-3 py-3 rounded-lg mt-6">
        <img src="frontend/image/image_1/icon-reaction.svg" alt="">
        <p class="text-red-500 ms-2">Reaction</p>
        <p class="ms-auto text-gray-300"><span class="font-bold text-black">80</span> / 100</p>
      </div>
      <div class="flex bg-yellow-50 px-3 py-3 rounded-lg mt-3">
        <img src="frontend/image/image_1/icon-memory.svg" alt="">
        <p class="text-yellow-500 ms-2">Memory</p>
        <p class="ms-auto text-gray-300"><span class="font-bold text-black">92 </span> / 100</p>
      </div>
      <div class="flex bg-green-50 px-3 py-3 rounded-lg mt-3">
        <img src="frontend/image/image_1/icon-verbal.svg" alt="">
        <p class="text-green-500 ms-2">Reaction</p>
        <p class="ms-auto text-gray-300"><span class="font-bold text-black">61</span> / 100</p>
      </div>
      <div class="flex bg-blue-50 px-3 py-3 rounded-lg mt-3">
        <img src="frontend/image/image_1/icon-visual.svg" alt="">
        <p class="text-blue-900 ms-2 text-pu">Reaction</p>
        <p class="ms-auto text-gray-300"><span class="font-bold text-black">72</span> / 100</p>
      </div>
      <div class="mt-5 bg-slate-800 hover:bg-purple-700  text-center rounded-full cursor-pointer ">
        <button class="text-white py-4"><a href="#">Continue</a></button>
      </div>
    </div>
  </div>
  <div class="attribution mt-16">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Just XaXA</a>.
  </div>
</body>
</html>
