<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="/frontend/css/master.css">
    <link rel="stylesheet" href="/frontend/css/calculator.css">
    <link rel="icon" type="image/png" sizes="32x32" href="/frontend/image/image_2/favicon-32x32.png">
</head>
<style>
    .attribution { font-size: 12px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    .dd{background-color: red;
    opacity:20; }
  </style>
<body class="font-[Poppins]">
    <a href="/frontend/index.html">go back</a>
    <form class="mx-auto shadow-2xl">
        <div class="bungkus">
            <div class="">
                <p>DAY</p>
                <input type="text" name="date" id="date" class="inp" size="1" placeholder="DD">  
            </div>
            <div class="">
                <p>MONTH</p>
                <input type="text" name="month" id="month" class="inp" size="1" placeholder="MM"> 
            </div>
            <div class="">
                <p>YEAR</p>
                <input type="text" name="year" id="year" class="inp" size="1" placeholder="YYYY">  
            </div>      
        </div>
        <div class="bungkus2">
            <hr>
            <button name="submit" id="submit" value="submit" type="button" onclick="age()"><img src="/frontend/image/img_calc/icon-arrow.svg" alt=""></button>
        </div>
        
        <!-- <input type="button" name="submit" id="submit" value="submit" onclick="age()"><img src="/frontend/image/img_calc/icon-arrow.svg" alt=""> -->
        <div class="age " id="age">
            <p><span>--</span>years</p>
            <p><span>--</span>months</p>
            <p><span>--</span>day</p>
        </div>
    </form>
    <footer id="sec"class="attribution mt-16 py-5  ">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
        Coded by <a href="#">Just Xaxa</a>.
    </footer>

    <script src="/frontend/js/calc.js"></script>
</body>
</html>
